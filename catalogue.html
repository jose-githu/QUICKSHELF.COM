<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue — Quickshelf Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0f;
            --ink-mid: #12121d;
            --surface: #f4f3ef;
            --accent: #e8ff3c;
            --local: #00d97e;
            --jumia: #f77f00;
            --kilimall: #e02020;
            --text-dim: #8a8a9a;
            --border: rgba(255,255,255,0.07);
            --card-bg: #12121d;
            --card-border: rgba(255,255,255,0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            color: var(--surface);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 40px;
            background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        .logo .dot { color: var(--accent); }

        .nav-right { display: flex; align-items: center; gap: 16px; }

        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--surface); padding: 9px 18px; border-radius: 7px;
            font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.1); }

        .cart-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--accent); color: var(--ink); border: none;
            padding: 10px 20px; border-radius: 7px;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
            cursor: pointer; transition: all 0.2s;
        }

        .cart-btn:hover { background: #d4eb00; transform: translateY(-1px); }

        .cart-count {
            background: var(--ink); color: var(--accent); border-radius: 50%;
            width: 20px; height: 20px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: 800;
        }

        /* ── CATALOGUE HEADER ── */
        .cat-header {
            position: relative; z-index: 1;
            padding: 48px 40px 32px;
            border-bottom: 1px solid var(--border);
        }

        .cat-title {
            font-family: 'Syne', sans-serif; font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900; letter-spacing: -2px; margin-bottom: 8px;
        }

        .cat-subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; }

        /* ── SEARCH BAR ── */
        .search-row {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }

        .search-box {
            flex: 1; min-width: 280px;
            display: flex; align-items: center;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 9px; overflow: hidden; transition: all 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent); background: rgba(232,255,60,0.04); }

        .search-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 15px;
            padding: 14px 18px;
        }

        .search-box input::placeholder { color: rgba(255,255,255,0.25); }
        .search-icon { padding: 0 16px; color: var(--text-dim); font-size: 16px; }

        .search-submit {
            background: var(--accent); color: var(--ink); border: none;
            padding: 14px 24px; font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }

        .search-submit:hover { background: #d4eb00; }

        .sort-select {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            color: var(--surface); padding: 14px 18px; border-radius: 9px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; outline: none;
        }

        .sort-select option { background: #12121d; }

        /* ── STREAM FILTER TABS ── */
        .stream-tabs {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
        }

        .stream-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 20px; border: 1px solid;
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: 'DM Sans', sans-serif;
        }

        .stream-tab.all {
            border-color: rgba(255,255,255,0.15); color: var(--surface);
            background: rgba(255,255,255,0.06);
        }

        .stream-tab.all.active { background: var(--surface); color: var(--ink); border-color: var(--surface); }

        .stream-tab.local { border-color: rgba(0,217,126,0.3); color: var(--local); background: rgba(0,217,126,0.05); }
        .stream-tab.local.active { background: var(--local); color: var(--ink); }

        .stream-tab.jumia { border-color: rgba(247,127,0,0.3); color: var(--jumia); background: rgba(247,127,0,0.05); }
        .stream-tab.jumia.active { background: var(--jumia); color: white; }

        .stream-tab.kilimall { border-color: rgba(224,32,32,0.3); color: var(--kilimall); background: rgba(224,32,32,0.05); }
        .stream-tab.kilimall.active { background: var(--kilimall); color: white; }

        /* ── CATEGORY PILLS ── */
        .category-row {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
        }

        .category-row::-webkit-scrollbar { height: 3px; }
        .category-row::-webkit-scrollbar-thumb { background: rgba(232,255,60,0.3); border-radius: 3px; }

        .cat-pill {
            flex-shrink: 0; padding: 7px 16px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
            color: var(--text-dim);
        }

        .cat-pill:hover { border-color: rgba(232,255,60,0.4); color: var(--accent); }
        .cat-pill.active { background: rgba(232,255,60,0.1); border-color: rgba(232,255,60,0.5); color: var(--accent); }

        /* ── MAIN LAYOUT ── */
        .main { position: relative; z-index: 1; padding: 32px 40px; }

        .stream-status-bar {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 28px; flex-wrap: wrap;
        }

        .results-count { font-size: 14px; color: var(--text-dim); }
        .results-count strong { color: var(--surface); }

        .stream-live {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; color: var(--text-dim);
        }

        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .live-dot.local { background: var(--local); }
        .live-dot.jumia { background: var(--jumia); animation-delay: 0.5s; }
        .live-dot.kilimall { background: var(--kilimall); animation-delay: 1s; }

        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ── PRODUCTS GRID ── */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* ── PRODUCT CARD ── */
        .product-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 14px; overflow: hidden;
            transition: all 0.3s; cursor: pointer; position: relative;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .product-card.local-item {
            border-color: rgba(0,217,126,0.2);
        }

        .product-card.local-item:hover {
            border-color: rgba(0,217,126,0.4);
            box-shadow: 0 20px 40px rgba(0,217,126,0.08);
        }

        /* KIMANA READY badge */
        .kimana-badge {
            position: absolute; top: 12px; left: 12px; z-index: 2;
            background: var(--local); color: var(--ink);
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 10px;
            letter-spacing: 0.5px; padding: 5px 10px; border-radius: 20px;
            display: flex; align-items: center; gap: 4px;
        }

        /* Source badge (Jumia/Kilimall) */
        .source-badge-card {
            position: absolute; top: 12px; left: 12px; z-index: 2;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 9px;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 4px 10px; border-radius: 20px;
        }

        .source-badge-card.jumia { background: rgba(247,127,0,0.9); color: white; }
        .source-badge-card.kilimall { background: rgba(224,32,32,0.9); color: white; }

        .product-img {
            width: 100%; height: 220px; object-fit: cover;
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            font-size: 72px; position: relative; overflow: hidden;
        }

        .product-img img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .product-img .img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(10,10,15,0.6) 0%, transparent 50%);
        }

        .product-body { padding: 18px; }

        .product-source-line {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
            margin-bottom: 8px; text-transform: uppercase;
        }

        .product-source-line.local { color: var(--local); }
        .product-source-line.jumia { color: var(--jumia); }
        .product-source-line.kilimall { color: var(--kilimall); }

        .source-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .local .source-dot { background: var(--local); }
        .jumia .source-dot { background: var(--jumia); }
        .kilimall .source-dot { background: var(--kilimall); }

        .product-name {
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
            line-height: 1.3; margin-bottom: 6px; color: var(--surface);
        }

        .product-vendor { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }

        .product-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
        }

        .product-price {
            font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
            color: var(--surface);
        }

        .product-price .kes { font-size: 13px; color: var(--text-dim); font-weight: 400; }

        .add-btn {
            background: var(--accent); color: var(--ink); border: none;
            padding: 9px 16px; border-radius: 7px;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }

        .add-btn:hover { background: #d4eb00; transform: scale(1.05); }

        .add-btn.local-source {
            background: var(--local);
        }

        .add-btn.local-source:hover { background: #00f090; }

        .out-of-stock {
            font-size: 12px; color: var(--text-dim); font-weight: 600;
            padding: 9px 0;
        }

        /* ── SKELETON LOADER ── */
        .skeleton-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 14px; overflow: hidden;
        }

        .skeleton-img {
            width: 100%; height: 220px;
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
        }

        .skeleton-body { padding: 18px; }

        .skeleton-line {
            height: 12px; border-radius: 6px; margin-bottom: 10px;
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
        }

        .skeleton-line.short { width: 60%; }
        .skeleton-line.tall { height: 28px; width: 40%; margin-top: 16px; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ── LOADING STREAM BANNER ── */
        .stream-loading-banner {
            display: none; align-items: center; gap: 12px;
            padding: 12px 18px; border-radius: 9px;
            background: rgba(247,127,0,0.06); border: 1px solid rgba(247,127,0,0.15);
            font-size: 13px; color: var(--text-dim); margin-bottom: 20px;
        }

        .stream-loading-banner.show { display: flex; }

        .mini-spinner {
            width: 14px; height: 14px; flex-shrink: 0;
            border: 2px solid rgba(247,127,0,0.2); border-top-color: var(--jumia);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1/-1; text-align: center; padding: 80px 20px;
            color: var(--text-dim);
        }

        .empty-icon { font-size: 72px; margin-bottom: 20px; opacity: 0.4; }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--surface); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* ── CART SIDEBAR ── */
        .cart-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1998;
        }

        .cart-overlay.show { display: block; }

        .cart-sidebar {
            position: fixed; right: -480px; top: 0; width: 440px; height: 100%;
            background: var(--ink-mid); border-left: 1px solid var(--border);
            z-index: 1999; display: flex; flex-direction: column;
            transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        .cart-sidebar.open { right: 0; }

        .cart-head {
            padding: 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .cart-head h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }

        .close-cart-btn {
            background: rgba(255,255,255,0.06); border: none; color: var(--text-dim);
            width: 34px; height: 34px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .close-cart-btn:hover { background: rgba(224,32,32,0.2); color: #ff6b6b; }

        .cart-items-list { flex: 1; overflow-y: auto; padding: 20px; }

        .cart-item {
            display: flex; gap: 14px; padding: 14px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 10px; margin-bottom: 12px;
        }

        .ci-img {
            width: 72px; height: 72px; border-radius: 8px;
            background: rgba(255,255,255,0.04);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; overflow: hidden; flex-shrink: 0;
        }

        .ci-img img { width: 100%; height: 100%; object-fit: cover; }

        .ci-info { flex: 1; }
        .ci-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .ci-price { font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 10px; }

        .ci-controls { display: flex; align-items: center; gap: 8px; }

        .qty-btn {
            background: rgba(255,255,255,0.06); border: none; color: var(--surface);
            width: 28px; height: 28px; border-radius: 6px; font-weight: 700; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .qty-btn:hover { background: var(--accent); color: var(--ink); }
        .qty-num { font-size: 14px; font-weight: 700; min-width: 24px; text-align: center; }

        .remove-ci {
            margin-left: auto; background: rgba(224,32,32,0.1); border: none;
            color: #ff6b6b; padding: 5px 12px; border-radius: 6px;
            font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }

        .remove-ci:hover { background: rgba(224,32,32,0.25); }

        .cart-foot {
            padding: 24px; border-top: 1px solid var(--border);
        }

        .cart-total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }

        .cart-total-label { font-size: 14px; color: var(--text-dim); }

        .cart-total-num {
            font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 900; color: var(--accent);
        }

        .checkout-btn {
            width: 100%; background: var(--accent); color: var(--ink); border: none;
            padding: 16px; border-radius: 9px;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px;
            cursor: pointer; transition: all 0.2s;
        }

        .checkout-btn:hover { background: #d4eb00; transform: translateY(-1px); }

        /* ── PRODUCT MODAL ── */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            z-index: 3000; align-items: center; justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-box {
            background: var(--ink-mid); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; max-width: 580px; width: 90%; max-height: 88vh;
            overflow-y: auto; padding: 36px;
            animation: mSlide 0.3s ease;
        }

        @keyframes mSlide { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; flex: 1; margin-right: 16px; line-height: 1.3; }
        .modal-close {
            background: rgba(255,255,255,0.06); border: none; color: var(--text-dim);
            width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }

        .modal-close:hover { background: rgba(224,32,32,0.2); color: #ff6b6b; transform: rotate(90deg); }

        .modal-img {
            width: 100%; height: 240px; border-radius: 10px; overflow: hidden;
            background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center;
            font-size: 80px; margin-bottom: 24px;
        }

        .modal-img img { width: 100%; height: 100%; object-fit: cover; }

        .modal-source-label {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 12px;
        }

        .modal-vendor { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
        .modal-desc { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 20px; }

        .modal-price {
            font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 900;
            margin-bottom: 24px;
        }

        .modal-add-btn {
            width: 100%; background: var(--accent); color: var(--ink); border: none;
            padding: 16px; border-radius: 10px;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px;
            cursor: pointer; transition: all 0.2s;
        }

        .modal-add-btn:hover { background: #d4eb00; }
        .modal-add-btn.local-add { background: var(--local); }
        .modal-add-btn.local-add:hover { background: #00f090; }

        /* ── CHECKOUT MODAL ── */
        .checkout-modal-box {
            background: var(--ink-mid); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; max-width: 480px; width: 90%; max-height: 90vh;
            overflow-y: auto; padding: 36px;
            animation: mSlide 0.3s ease;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }

        .form-input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 12px 16px; color: var(--surface);
            font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.2s;
        }

        .form-input:focus { border-color: var(--accent); background: rgba(232,255,60,0.04); }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }
        textarea.form-input { min-height: 80px; resize: vertical; }

        .order-summary-box {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px; margin-bottom: 20px;
        }

        .order-summary-box h4 { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }

        .summary-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .summary-row:last-child { border-bottom: none; font-weight: 700; font-size: 15px; color: var(--surface); margin-top: 6px; padding-top: 12px; }

        .place-order-btn {
            width: 100%; background: var(--local); color: var(--ink); border: none;
            padding: 16px; border-radius: 9px;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px;
            cursor: pointer; transition: all 0.2s;
        }

        .place-order-btn:hover { background: #00f090; }
        .place-order-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── NOTIFICATION ── */
        .notif {
            position: fixed; top: 80px; right: 24px;
            background: var(--ink-mid); border: 1px solid rgba(255,255,255,0.1);
            color: var(--surface); padding: 14px 20px; border-radius: 10px;
            font-size: 14px; font-weight: 500; z-index: 9999;
            display: none; min-width: 280px; animation: notifIn 0.3s ease;
        }

        .notif.show { display: block; }
        .notif.success { border-color: rgba(0,217,126,0.4); color: var(--local); }
        .notif.error { border-color: rgba(224,32,32,0.4); color: #ff6b6b; }

        @keyframes notifIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .inline-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(10,10,15,0.3); border-top-color: var(--ink);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .navbar { padding: 14px 20px; }
            .cat-header, .main { padding-left: 20px; padding-right: 20px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .product-img { height: 160px; font-size: 48px; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div id="notif" class="notif"></div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo" onclick="goHome()">⚡ Quickshelf<span class="dot">.</span></div>
        <div class="nav-right">
            <button class="nav-btn" onclick="goToDashboard()">👤 Account</button>
            <button class="cart-btn" onclick="toggleCart()">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <!-- HEADER -->
    <div class="cat-header">
        <h1 class="cat-title">The Catalogue</h1>
        <p class="cat-subtitle">Local vendors first · Jumia & Kilimall as extended inventory</p>

        <div class="search-row">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search all sources..." onkeydown="if(event.key==='Enter')searchProducts()">
                <button class="search-submit" onclick="searchProducts()">Search</button>
            </div>
            <select class="sort-select" onchange="sortProducts(this.value)">
                <option value="featured">Sort: Featured</option>
                <option value="price-low">Price: Low → High</option>
                <option value="price-high">Price: High → Low</option>
                <option value="name">Name: A–Z</option>
            </select>
        </div>

        <!-- STREAM TABS -->
        <div class="stream-tabs" style="margin-bottom: 14px;">
            <button class="stream-tab all active" onclick="filterStream('all', this)">⚡ All Sources</button>
            <button class="stream-tab local" onclick="filterStream('local', this)">🟢 KIMANA READY</button>
            <button class="stream-tab jumia" onclick="filterStream('jumia', this)">🟠 Jumia</button>
            <button class="stream-tab kilimall" onclick="filterStream('kilimall', this)">🔴 Kilimall</button>
        </div>

        <!-- CATEGORY PILLS -->
        <div class="category-row">
            <span class="cat-pill active" onclick="filterCat('all', this)">🌟 All</span>
            <span class="cat-pill" onclick="filterCat('electronics', this)">📱 Electronics</span>
            <span class="cat-pill" onclick="filterCat('fashion', this)">👗 Fashion</span>
            <span class="cat-pill" onclick="filterCat('home', this)">🏠 Home & Living</span>
            <span class="cat-pill" onclick="filterCat('beauty', this)">💄 Beauty</span>
            <span class="cat-pill" onclick="filterCat('sports', this)">⚽ Sports</span>
            <span class="cat-pill" onclick="filterCat('food', this)">🍎 Food & Grocery</span>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <!-- Stream loading status -->
        <div class="stream-loading-banner" id="streamBanner">
            <div class="mini-spinner"></div>
            <span id="streamBannerText">Syncing Jumia & Kilimall inventory...</span>
        </div>

        <div class="stream-status-bar">
            <div class="results-count">Showing <strong id="resultCount">0</strong> products</div>
            <div class="stream-live">
                <span class="live-dot local"></span> Local
                <span class="live-dot jumia" style="margin-left:8px;"></span> Jumia
                <span class="live-dot kilimall" style="margin-left:8px;"></span> Kilimall
            </div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- CART SIDEBAR -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-head">
            <h2>Your Cart 🛒</h2>
            <button class="close-cart-btn" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items-list" id="cartItemsList"></div>
        <div class="cart-foot">
            <div class="cart-total-row">
                <span class="cart-total-label">Total</span>
                <span class="cart-total-num" id="cartTotal">KES 0</span>
            </div>
            <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout →</button>
        </div>
    </div>

    <!-- PRODUCT DETAIL MODAL -->
    <div class="modal" id="productModal">
        <div class="modal-box">
            <div class="modal-head">
                <h2 class="modal-title" id="modalName"></h2>
                <button class="modal-close" onclick="closeProductModal()">×</button>
            </div>
            <div class="modal-img" id="modalImg"></div>
            <div class="modal-source-label" id="modalSource"></div>
            <div class="modal-vendor" id="modalVendor"></div>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-price" id="modalPrice"></div>
            <button class="modal-add-btn" id="modalAddBtn" onclick="addFromModal()">+ Add to Cart</button>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div class="modal" id="checkoutModal">
        <div class="checkout-modal-box">
            <div class="modal-head">
                <h2 class="modal-title">Complete Order</h2>
                <button class="modal-close" onclick="closeCheckout()">×</button>
            </div>
            <div class="order-summary-box" id="orderSummary"></div>
            <div class="form-group">
                <label>Delivery Address *</label>
                <input type="text" class="form-input" id="chkAddress" placeholder="e.g. Kimana Town, near the market">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" class="form-input" id="chkPhone" placeholder="+254 700 000000">
            </div>
            <div class="form-group">
                <label>Payment Method *</label>
                <select class="form-input" id="chkPayment">
                    <option value="">Select method</option>
                    <option value="mpesa">M-Pesa (STK Push)</option>
                    <option value="cash">Cash on Delivery</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea class="form-input" id="chkNotes" placeholder="Any special instructions..."></textarea>
            </div>
            <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">✅ Place Order</button>
        </div>
    </div>

    <script>
        // ── CONFIG ──────────────────────────────────────────────────────────
        const PB = 'http://127.0.0.1:8090';

        // ── MOCK EXTERNAL PRODUCTS ───────────────────────────────────────────
        // In production these come from your Jumia API adapter and Kilimall scraper.
        // Each has source_platform, external_sync_id, and auto-margin already applied.
        const MOCK_JUMIA = [
            { id: 'j001', name_: 'Tecno Spark 20 Pro', description_: '6.78" HD+ display, 256GB storage, 5000mAh battery. Dual SIM.', price: 18500, category_: 'electronics', stock_: 50, is_available: true, source_platform: 'jumia', external_sync_id: 'JM-TECH-001', expand: { vendor: { shop_name: 'Jumia Kenya' } } },
            { id: 'j002', name_: 'Itel A60s', description_: 'Budget Android with 6.6" display, 3GB RAM, Android 13 Go.', price: 8200, category_: 'electronics', stock_: 30, is_available: true, source_platform: 'jumia', external_sync_id: 'JM-ITEL-002', expand: { vendor: { shop_name: 'Jumia Kenya' } } },
            { id: 'j003', name_: 'Hisense 43" Smart TV', description_: 'Full HD Android TV with WiFi, YouTube, Netflix built-in.', price: 31000, category_: 'electronics', stock_: 15, is_available: true, source_platform: 'jumia', external_sync_id: 'JM-TV-003', expand: { vendor: { shop_name: 'Jumia Kenya' } } },
            { id: 'j004', name_: 'Men\'s Running Shoes', description_: 'Lightweight mesh upper, cushioned sole, sizes 40-46.', price: 3800, category_: 'fashion', stock_: 80, is_available: true, source_platform: 'jumia', external_sync_id: 'JM-SHOE-004', expand: { vendor: { shop_name: 'Jumia Fashion' } } },
            { id: 'j005', name_: 'Solar Lantern 10W', description_: 'Foldable solar panel, 2 USB ports, LED lantern. 8hr runtime.', price: 2400, category_: 'home', stock_: 40, is_available: true, source_platform: 'jumia', external_sync_id: 'JM-SOL-005', expand: { vendor: { shop_name: 'Jumia Kenya' } } },
        ];

        const MOCK_KILIMALL = [
            { id: 'k001', name_: 'Samsung Galaxy A15', description_: '6.5" Super AMOLED, 128GB, 5000mAh, quad camera.', price: 21500, category_: 'electronics', stock_: 25, is_available: true, source_platform: 'kilimall', external_sync_id: 'KM-SAM-001', expand: { vendor: { shop_name: 'Kilimall Electronics' } } },
            { id: 'k002', name_: 'Vitron 3-Burner Gas Cooker', description_: 'Stainless steel, auto ignition, glass lid included.', price: 12800, category_: 'home', stock_: 10, is_available: true, source_platform: 'kilimall', external_sync_id: 'KM-GAS-002', expand: { vendor: { shop_name: 'Kilimall Home' } } },
            { id: 'k003', name_: 'Nivea Body Lotion 400ml', description_: 'Deep moisture for dry skin. Long-lasting hydration.', price: 780, category_: 'beauty', stock_: 200, is_available: true, source_platform: 'kilimall', external_sync_id: 'KM-NIV-003', expand: { vendor: { shop_name: 'Kilimall Beauty' } } },
            { id: 'k004', name_: 'Football Boots Lace-Up', description_: 'Synthetic leather upper, screw-in studs, sizes 38-46.', price: 2900, category_: 'sports', stock_: 60, is_available: true, source_platform: 'kilimall', external_sync_id: 'KM-FB-004', expand: { vendor: { shop_name: 'Kilimall Sports' } } },
        ];

        // Emoji fallbacks by category
        const EMOJI_MAP = { electronics: '📱', fashion: '👗', home: '🏠', beauty: '💄', sports: '⚽', food: '🍎' };

        // ── AUTH & SESSION ───────────────────────────────────────────────────
        const ls = {
            get: k => { try { return localStorage.getItem(k); } catch { return null; } },
            set: (k,v) => { try { localStorage.setItem(k,v); } catch {} },
        };

        if (ls.get('quickshelfLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        let sessionRaw = {};
        try { sessionRaw = JSON.parse(ls.get('quickshelfUserData') || '{}'); } catch {}
        const customerPhone = ls.get('quickshelfUserPhone') || sessionRaw.phone || '';
        const pbToken = ls.get('quickshelfPBToken') || '';

        // ── STATE ────────────────────────────────────────────────────────────
        let allProducts     = [];   // merged final list
        let localProducts   = [];   // from PocketBase
        let externalProducts = [];  // Jumia + Kilimall
        let currentCat      = 'all';
        let currentStream   = 'all';
        let sortOrder       = 'featured';
        let activeProductId = null;

        // ── CART ─────────────────────────────────────────────────────────────
        const cartKey = `quickshelfCart_${customerPhone || 'guest'}`;
        let cart = [];
        try { cart = JSON.parse(ls.get(cartKey)) || []; } catch { cart = []; }

        // ── INIT ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            // Read URL query param from Mother Router
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';
            if (query) document.getElementById('searchInput').value = query;
            if (customerPhone) document.getElementById('chkPhone').value = customerPhone;

            renderSkeletons(8);
            updateCartUI();

            // Phase 1: Load local (fast)
            localProducts = await fetchLocalProducts(currentCat, query);
            localProducts.forEach(p => p.source_platform = p.source_platform || 'local');

            // Phase 2: Load external (simulated delay)
            showStreamBanner('Syncing Jumia & Kilimall inventory...');
            await new Promise(r => setTimeout(r, 1200)); // Simulate API delay
            externalProducts = await fetchExternalProducts();
            hideStreamBanner();

            mergeAndDisplay(query);
        });

        // ── FETCH LOCAL (PocketBase) ──────────────────────────────────────────
        async function fetchLocalProducts(cat = 'all', search = '') {
            let filters = ['is_available=true'];
            if (cat && cat !== 'all') filters.push(`category_='${cat}'`);
            if (search) filters.push(`(name_~'${search}'||description_~'${search}')`);
            const sort = buildSortParam(sortOrder);
            try {
                const res = await fetch(
                    `${PB}/api/collections/products_/records?perPage=100&expand=vendor&filter=(${filters.join('&&')})${sort}`
                );
                if (!res.ok) throw new Error();
                const data = await res.json();
                return (data.items || []).map(p => ({ ...p, source_platform: 'local' }));
            } catch {
                showNotif('⚠️ PocketBase unreachable — showing demo data only', 'error');
                return [];
            }
        }

        // ── FETCH EXTERNAL (Jumia + Kilimall mock) ───────────────────────────
        async function fetchExternalProducts() {
            // In production: replace with actual API calls / scraper endpoints
            // e.g. fetch('/api/jumia/products') or fetch('/api/kilimall/products')
            return [...MOCK_JUMIA, ...MOCK_KILIMALL];
        }

        // ── DIRECTOR PROTOCOL: MERGE STREAMS ────────────────────────────────
        // Rule: Local products ALWAYS come first. Same external product deduped by external_sync_id.
        function mergeAndDisplay(search = '') {
            const searchTerm = (document.getElementById('searchInput').value || search).toLowerCase();

            let filtered_local    = localProducts.filter(p => matchesCatFilter(p) && matchesSearch(p, searchTerm));
            let filtered_external = externalProducts.filter(p => matchesCatFilter(p) && matchesSearch(p, searchTerm) && matchesStreamFilter(p));

            // Remove any external products that have a local equivalent (by name match - simplified dedup)
            const localNames = new Set(filtered_local.map(p => (p.name_ || '').toLowerCase().slice(0, 20)));
            filtered_external = filtered_external.filter(p => !localNames.has((p.name_ || '').toLowerCase().slice(0, 20)));

            // Apply stream filter to local too
            if (currentStream === 'jumia')    filtered_local = [];
            if (currentStream === 'kilimall') filtered_local = [];
            if (currentStream === 'local')    filtered_external = [];

            // Sort external by sort order
            const sorted_external = sortList(filtered_external);

            // DIRECTOR RULE: Local → External
            allProducts = [...filtered_local, ...sorted_external];

            document.getElementById('resultCount').textContent = allProducts.length;
            renderProducts(allProducts);
        }

        function matchesCatFilter(p) {
            if (currentCat === 'all') return true;
            return (p.category_ || p.category || '') === currentCat;
        }

        function matchesSearch(p, term) {
            if (!term) return true;
            const n = (p.name_ || p.name || '').toLowerCase();
            const d = (p.description_ || p.description || '').toLowerCase();
            return n.includes(term) || d.includes(term);
        }

        function matchesStreamFilter(p) {
            if (currentStream === 'all') return true;
            return p.source_platform === currentStream;
        }

        function sortList(list) {
            return [...list].sort((a, b) => {
                if (sortOrder === 'price-low')  return (a.price || 0) - (b.price || 0);
                if (sortOrder === 'price-high') return (b.price || 0) - (a.price || 0);
                if (sortOrder === 'name')       return (a.name_ || '').localeCompare(b.name_ || '');
                return 0;
            });
        }

        function buildSortParam(order) {
            return { 'price-low': '&sort=price', 'price-high': '&sort=-price', 'name': '&sort=name_' }[order] || '';
        }

        // ── RENDER PRODUCTS ───────────────────────────────────────────────────
        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            if (!list.length) {
                grid.innerHTML = `<div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <h3>No Products Found</h3>
                    <p>Try a different search or filter</p>
                </div>`;
                return;
            }

            grid.innerHTML = list.map(p => {
                const isLocal   = p.source_platform === 'local';
                const isJumia   = p.source_platform === 'jumia';
                const isKilimall = p.source_platform === 'kilimall';
                const name      = p.name_ || p.name || 'Product';
                const price     = p.price || 0;
                const stock     = p.stock_ ?? p.stock ?? 0;
                const inStock   = stock > 0;
                const vendor    = p.expand?.vendor?.shop_name || (isLocal ? 'Local Vendor' : isJumia ? 'Jumia Kenya' : 'Kilimall');
                const imgSrc    = getImgSrc(p);
                const emoji     = EMOJI_MAP[p.category_ || p.category || ''] || '📦';

                const imageHtml = imgSrc.startsWith('http')
                    ? `<img src="${imgSrc}" alt="${name}" onerror="this.parentElement.innerHTML='${emoji}'">`
                    : emoji;

                const badgeHtml = isLocal
                    ? `<div class="kimana-badge">⚡ KIMANA READY</div>`
                    : isJumia
                        ? `<div class="source-badge-card jumia">Jumia</div>`
                        : `<div class="source-badge-card kilimall">Kilimall</div>`;

                const sourceClass = isLocal ? 'local' : isJumia ? 'jumia' : 'kilimall';
                const sourceLabel = isLocal ? '🟢 Local Vendor' : isJumia ? '🟠 Jumia' : '🔴 Kilimall';

                const addBtnHtml = inStock
                    ? `<button class="add-btn ${isLocal ? 'local-source' : ''}" onclick="event.stopPropagation();addToCart('${p.id}')">+ Add</button>`
                    : `<span class="out-of-stock">Out of stock</span>`;

                return `
                <div class="product-card ${isLocal ? 'local-item' : ''}" onclick="viewProduct('${p.id}')">
                    <div class="product-img">
                        ${imageHtml}
                        <div class="img-overlay"></div>
                        ${badgeHtml}
                    </div>
                    <div class="product-body">
                        <div class="product-source-line ${sourceClass}">
                            <span class="source-dot"></span>${sourceLabel}
                        </div>
                        <div class="product-name">${name}</div>
                        <div class="product-vendor">by ${vendor}</div>
                        <div class="product-footer">
                            <div class="product-price"><span class="kes">KES </span>${Number(price).toLocaleString()}</div>
                            ${addBtnHtml}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderSkeletons(count) {
            document.getElementById('productsGrid').innerHTML = Array(count).fill(`
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line tall"></div>
                    </div>
                </div>`).join('');
        }

        // ── IMAGE HELPER ─────────────────────────────────────────────────────
        function getImgSrc(p) {
            if (p.source_platform === 'local' && p.image) {
                return `${PB}/api/files/products_/${p.id}/${p.image}`;
            }
            // External products: use their image URL if available
            if (p.image_url) return p.image_url;
            return EMOJI_MAP[p.category_ || p.category || ''] || '📦';
        }

        // ── FILTERS ───────────────────────────────────────────────────────────
        function filterCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            mergeAndDisplay();
        }

        function filterStream(stream, el) {
            currentStream = stream;
            document.querySelectorAll('.stream-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            mergeAndDisplay();
        }

        function searchProducts() { mergeAndDisplay(); }

        async function sortProducts(order) {
            sortOrder = order;
            localProducts = await fetchLocalProducts(currentCat, document.getElementById('searchInput').value.trim());
            mergeAndDisplay();
        }

        // ── STREAM BANNER ─────────────────────────────────────────────────────
        function showStreamBanner(msg) {
            const b = document.getElementById('streamBanner');
            document.getElementById('streamBannerText').textContent = msg;
            b.classList.add('show');
        }

        function hideStreamBanner() {
            document.getElementById('streamBanner').classList.remove('show');
        }

        // ── CART LOGIC ────────────────────────────────────────────────────────
        function addToCart(productId) {
            const p = allProducts.find(x => x.id === productId);
            if (!p) return;
            const stock = p.stock_ ?? p.stock ?? 999;
            const existing = cart.find(i => i.id === productId);
            if (existing) {
                if (existing.quantity >= stock) { showNotif('⚠️ Stock limit reached', 'error'); return; }
                existing.quantity++;
            } else {
                cart.push({
                    id: p.id, name: p.name_ || p.name, price: p.price,
                    image: getImgSrc(p), quantity: 1,
                    source_platform: p.source_platform || 'local'
                });
            }
            saveCart(); updateCartUI();
            showNotif(`✅ ${p.name_ || p.name} added!`, 'success');
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart(); updateCartUI();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) removeFromCart(id);
            else { saveCart(); updateCartUI(); }
        }

        function updateCartUI() {
            const count = cart.reduce((s,i) => s + i.quantity, 0);
            const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = `KES ${total.toLocaleString()}`;

            const list = document.getElementById('cartItemsList');
            if (!cart.length) {
                list.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-dim);">
                    <div style="font-size:48px;margin-bottom:16px;opacity:.4">🛒</div>
                    <p>Your cart is empty</p></div>`;
                return;
            }

            list.innerHTML = cart.map(item => {
                const imgHtml = item.image && item.image.startsWith('http')
                    ? `<img src="${item.image}" onerror="this.parentElement.textContent='📦'">`
                    : (item.image || '📦');
                return `<div class="cart-item">
                    <div class="ci-img">${imgHtml}</div>
                    <div class="ci-info">
                        <div class="ci-name">${item.name}</div>
                        <div class="ci-price">KES ${Number(item.price).toLocaleString()}</div>
                        <div class="ci-controls">
                            <button class="qty-btn" onclick="updateQty('${item.id}',-1)">−</button>
                            <span class="qty-num">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQty('${item.id}',1)">+</button>
                            <button class="remove-ci" onclick="removeFromCart('${item.id}')">Remove</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('cartOverlay').classList.toggle('show');
        }

        function saveCart() { ls.set(cartKey, JSON.stringify(cart)); }

        // ── PRODUCT MODAL ─────────────────────────────────────────────────────
        function viewProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            activeProductId = id;
            const isLocal   = p.source_platform === 'local';
            const imgSrc    = getImgSrc(p);
            const name      = p.name_ || p.name || 'Product';
            const desc      = p.description_ || p.description || '';
            const vendor    = p.expand?.vendor?.shop_name || (isLocal ? 'Local Vendor' : p.source_platform === 'jumia' ? 'Jumia Kenya' : 'Kilimall');

            document.getElementById('modalName').textContent  = name;
            document.getElementById('modalVendor').textContent = `by ${vendor}`;
            document.getElementById('modalDesc').textContent  = desc;
            document.getElementById('modalPrice').textContent = `KES ${Number(p.price).toLocaleString()}`;

            const srcEl = document.getElementById('modalSource');
            if (isLocal) {
                srcEl.innerHTML = `<span style="color:var(--local)">⚡ KIMANA READY · Local Vendor</span>`;
            } else {
                const col = p.source_platform === 'jumia' ? 'var(--jumia)' : 'var(--kilimall)';
                srcEl.innerHTML = `<span style="color:${col}">${p.source_platform === 'jumia' ? '🟠 Jumia Kenya' : '🔴 Kilimall'}</span>`;
            }

            const imgEl = document.getElementById('modalImg');
            imgEl.innerHTML = imgSrc.startsWith('http')
                ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='📦'">`
                : imgSrc;

            const addBtn = document.getElementById('modalAddBtn');
            addBtn.className = `modal-add-btn${isLocal ? ' local-add' : ''}`;

            document.getElementById('productModal').classList.add('active');
        }

        function addFromModal() {
            if (activeProductId) addToCart(activeProductId);
            closeProductModal();
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            activeProductId = null;
        }

        // ── CHECKOUT ──────────────────────────────────────────────────────────
        function openCheckout() {
            if (!cart.length) { showNotif('⚠️ Cart is empty', 'error'); return; }
            const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
            document.getElementById('orderSummary').innerHTML = `
                <h4>Order Summary</h4>
                ${cart.map(i => `<div class="summary-row"><span>${i.name} × ${i.quantity}</span><span>KES ${(i.price * i.quantity).toLocaleString()}</span></div>`).join('')}
                <div class="summary-row"><span>Total</span><span>KES ${total.toLocaleString()}</span></div>`;
            toggleCart();
            document.getElementById('checkoutModal').classList.add('active');
        }

        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }

        async function placeOrder() {
            const address = document.getElementById('chkAddress').value.trim();
            const phone   = document.getElementById('chkPhone').value.trim();
            const payment = document.getElementById('chkPayment').value;
            if (!address) { showNotif('⚠️ Enter delivery address', 'error'); return; }
            if (!phone)   { showNotif('⚠️ Enter phone number', 'error'); return; }
            if (!payment) { showNotif('⚠️ Select payment method', 'error'); return; }

            const total   = cart.reduce((s,i) => s + i.price * i.quantity, 0);
            const headers = { 'Content-Type': 'application/json', ...(pbToken ? { 'Authorization': pbToken } : {}) };
            const btn     = document.getElementById('placeOrderBtn');
            btn.disabled  = true;
            btn.innerHTML = '<span class="inline-spinner"></span> Placing...';

            try {
                const orderRes = await fetch(`${PB}/api/collections/orders/records`, {
                    method: 'POST', headers,
                    body: JSON.stringify({ total_amount: total, status: 'pending', payment_status: 'unpaid', delivery_address: address, phone })
                });
                const orderData = await orderRes.json();
                if (!orderRes.ok || !orderData.id) throw new Error(orderData.message || 'Order failed');
                const orderId = orderData.id;

                for (const item of cart) {
                    await fetch(`${PB}/api/collections/order_items/records`, {
                        method: 'POST', headers,
                        body: JSON.stringify({
                            order: orderId, product: item.id, quantity: item.quantity, price: item.price,
                            source_platform: item.source_platform || 'local'
                        })
                    });
                }

                // Deduct stock only for local items
                for (const item of cart.filter(i => i.source_platform === 'local')) {
                    const p = localProducts.find(x => x.id === item.id);
                    if (p) {
                        const newStock = Math.max(0, (p.stock_ ?? p.stock ?? 0) - item.quantity);
                        await fetch(`${PB}/api/collections/products_/records/${item.id}`, {
                            method: 'PATCH', headers, body: JSON.stringify({ stock_: newStock })
                        });
                    }
                }

                cart = []; saveCart(); updateCartUI(); closeCheckout();
                showNotif(`🎉 Order placed! ID: ${orderId.slice(0,8).toUpperCase()}`, 'success');
                setTimeout(() => { if (confirm('View your order in the dashboard?')) window.location.href = 'customer-dashboard.html'; }, 2000);

            } catch(err) {
                showNotif(`❌ ${err.message || 'Order failed'}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ Place Order';
            }
        }

        // ── HELPERS ───────────────────────────────────────────────────────────
        function showNotif(msg, type = 'info') {
            const n = document.getElementById('notif');
            n.textContent = msg;
            n.className = `notif show ${type}`;
            setTimeout(() => n.classList.remove('show'), 4000);
        }

        function goHome()        { window.location.href = 'index.html'; }
        function goToDashboard() { window.location.href = 'customer-dashboard.html'; }

        document.getElementById('productModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeProductModal(); });
        document.getElementById('checkoutModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCheckout(); });
    </script>
</body>
</html>
